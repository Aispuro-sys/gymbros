<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista Compartida - Talos Forge</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --text-2: #666;
      --border: #e0e0e0;
      --accent: #1976d2;
      --danger: #e53935;
      --surface: #f5f5f5;
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --card: #1a1a1a;
        --text: #f5f5f5;
        --text-2: #999;
        --border: #333;
        --surface: #222;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 500px; margin: 0 auto; padding: 1rem; }
    .header { text-align: center; padding: 2rem 1rem 1rem; }
    .logo { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: #fff; font-size: 24px; font-weight: bold; }
    .header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .header p { color: var(--text-2); font-size: 0.9rem; }
    .card { background: var(--card); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); }
    .progress-bar { background: var(--surface); border-radius: 8px; height: 8px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { background: var(--accent); height: 100%; transition: width 0.3s; }
    .item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 0.95rem; }
    .item-name.checked { text-decoration: line-through; opacity: 0.5; }
    .item-qty { color: var(--text-2); font-size: 0.8rem; }
    .item-meta { font-size: 0.75rem; color: var(--text-2); }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-2); }
    .empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .footer { text-align: center; padding: 1rem; color: var(--text-2); font-size: 0.8rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text-2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">TF</div>
      <h1>Lista de Supermercado</h1>
      <p id="shared-by">Cargando...</p>
    </div>
    <div id="content" class="loading">Cargando lista...</div>
    <div class="footer">Talos Forge - Your Progress</div>
  </div>

  <script>
    const API_BASE = '/api/shopping-list-public';
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">🔗</div><p>Enlace inválido</p></div>';
    } else {
      loadSharedList();
    }

    async function loadSharedList() {
      try {
        const res = await fetch(`${API_BASE}/shared/${token}`);
        if (!res.ok) throw new Error('No encontrada');
        const data = await res.json();

        document.getElementById('shared-by').textContent = `Compartida por ${data.sharedBy}`;

        const items = data.list.items;
        const checked = items.filter((i) => i.checked).length;
        const progress = items.length > 0 ? Math.round((checked / items.length) * 100) : 0;

        document.getElementById('content').innerHTML = `
          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <strong>${data.list.name}</strong>
              <span style="color:var(--text-2); font-size:0.85rem;">${checked}/${items.length}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          </div>
          <div class="card">
            ${items.length === 0 ? '<div class="empty"><div class="empty-icon">🛒</div><p>Lista vacía</p></div>' : items.map((item, idx) => `
              <div class="item">
                <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem('${item.id}', ${idx})" />
                <div class="item-name ${item.checked ? 'checked' : ''}">${item.name}</div>
                ${item.quantity ? `<div class="item-qty">${item.quantity}</div>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Lista no encontrada o ya no está disponible</p></div>';
      }
    }

    async function toggleItem(itemId, idx) {
      const checkbox = document.querySelectorAll('.item input[type="checkbox"]')[idx];
      const checked = checkbox.checked;
      const nameEl = checkbox.parentElement.querySelector('.item-name');

      if (nameEl) {
        nameEl.classList.toggle('checked', checked);
      }

      try {
        await fetch(`${API_BASE}/shared/${token}/items/${itemId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ checked }),
        });
        loadSharedList();
      } catch (err) {
        console.error('Toggle error:', err);
      }
    }
  </script>
</body>
</html>
