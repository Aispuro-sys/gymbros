<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista Compartida - Talos Forge</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --text-2: #666;
      --text-3: #999;
      --border: #e0e0e0;
      --accent: #1976d2;
      --accent-light: #e3f2fd;
      --danger: #e53935;
      --surface: #f5f5f5;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --card: #1a1a1a;
        --text: #f5f5f5;
        --text-2: #aaa;
        --text-3: #777;
        --border: #2a2a2a;
        --accent: #42a5f5;
        --accent-light: #1a237e;
        --surface: #222;
        --shadow: 0 2px 12px rgba(0,0,0,0.3);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .hero {
      background: linear-gradient(135deg, #1976d2, #0d47a1);
      color: #fff;
      padding: 2.5rem 1.5rem 2rem;
      border-radius: 0 0 24px 24px;
      text-align: center;
    }
    .hero-logo {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.75rem;
      font-size: 22px; font-weight: 800;
      border: 2px solid rgba(255,255,255,0.25);
    }
    .hero h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
    .hero p { font-size: 0.85rem; opacity: 0.8; }

    .container { max-width: 520px; margin: 0 auto; padding: 0 1rem 2rem; }

    .progress-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: -1.5rem;
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 1rem;
      position: relative;
    }
    .progress-ring { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring-text {
      position: absolute; top: 0; left: 0;
      width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
    }
    .progress-info { flex: 1; }
    .progress-info strong { font-size: 1rem; display: block; margin-bottom: 2px; }
    .progress-info span { font-size: 0.8rem; color: var(--text-2); }

    .section-title {
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-3);
      margin: 1.5rem 0 0.75rem; padding: 0 0.25rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .section-badge {
      background: var(--accent-light); color: var(--accent);
      padding: 2px 10px; border-radius: 20px; font-size: 0.7rem;
    }

    .items-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .item:last-child { border-bottom: none; }
    .item:active { background: var(--surface); }
    .item input[type="checkbox"] {
      width: 24px; height: 24px; cursor: pointer; flex-shrink: 0;
      accent-color: var(--accent);
    }
    .item-content { flex: 1; min-width: 0; }
    .item-name { font-size: 0.95rem; line-height: 1.3; }
    .item-name.checked { text-decoration: line-through; opacity: 0.45; }
    .item-meta { font-size: 0.72rem; color: var(--text-3); margin-top: 2px; }
    .item-qty {
      font-size: 0.78rem; color: var(--text-2);
      background: var(--surface); padding: 4px 10px;
      border-radius: 8px; white-space: nowrap;
    }
    .item-check-icon { font-size: 1.1rem; flex-shrink: 0; }

    .empty {
      text-align: center; padding: 3rem 1rem; color: var(--text-2);
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 0.75rem; }
    .empty h3 { font-size: 1.1rem; margin-bottom: 0.25rem; color: var(--text); }
    .empty p { font-size: 0.85rem; }

    .footer {
      text-align: center; padding: 2rem 1rem;
      color: var(--text-3); font-size: 0.78rem;
    }
    .footer strong { color: var(--text-2); }

    .loading {
      text-align: center; padding: 4rem 1rem; color: var(--text-2);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-logo">TF</div>
    <h1>Lista de Supermercado</h1>
    <p id="shared-by">Cargando...</p>
  </div>

  <div class="container">
    <div id="content" class="loading">
      <div class="spinner"></div>
      <p>Cargando lista...</p>
    </div>
    <div class="footer">
      <strong>Talos Forge</strong> — Your Progress
    </div>
  </div>

  <script>
    const API_BASE = '/api/shopping-list-public';
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">🔗</div><h3>Enlace inválido</h3><p>Falta el código de la lista</p></div>';
    } else {
      loadSharedList();
    }

    async function loadSharedList() {
      try {
        const res = await fetch(`${API_BASE}/shared/${token}`);
        if (!res.ok) throw new Error('No encontrada');
        const data = await res.json();

        document.getElementById('shared-by').textContent = `Compartida por ${data.sharedBy}`;

        const items = data.list.items;
        const checked = items.filter((i) => i.checked).length;
        const total = items.length;
        const progress = total > 0 ? Math.round((checked / total) * 100) : 0;
        const remaining = total - checked;
        const circumference = 2 * Math.PI * 26;

        document.getElementById('content').innerHTML = `
          <div class="progress-card fade-in">
            <div class="progress-ring">
              <svg width="60" height="60" viewBox="0 0 60 60">
                <circle cx="30" cy="30" r="26" fill="none" stroke="var(--border)" stroke-width="5"/>
                <circle cx="30" cy="30" r="26" fill="none" stroke="var(--accent)" stroke-width="5"
                  stroke-dasharray="${circumference}"
                  stroke-dashoffset="${circumference * (1 - progress / 100)}"
                  stroke-linecap="round"
                  style="transition: stroke-dashoffset 0.6s ease;"/>
              </svg>
              <div class="progress-ring-text">${progress}%</div>
            </div>
            <div class="progress-info">
              <strong>${data.list.name}</strong>
              <span>${checked} de ${total} comprados · ${remaining} pendiente(s)</span>
            </div>
          </div>

          <div class="section-title">
            <span>🛍️ Lista de compras</span>
            <span class="section-badge">${remaining} por comprar</span>
          </div>

          ${total === 0 ? `
            <div class="items-card">
              <div class="empty">
                <div class="empty-icon">🛒</div>
                <h3>Lista vacía</h3>
                <p>No hay items en esta lista</p>
              </div>
            </div>
          ` : `
            <div class="items-card fade-in">
              ${items.map((item, idx) => `
                <div class="item">
                  <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem('${item.id}', ${idx})" />
                  <div class="item-content">
                    <div class="item-name ${item.checked ? 'checked' : ''}">${item.name}</div>
                    ${item.recipe_names && item.recipe_names.length > 1 ? `<div class="item-meta">📦 En ${item.recipe_names.length} receta(s)</div>` : ''}
                  </div>
                  ${item.quantity ? `<div class="item-qty">${item.quantity}</div>` : ''}
                  ${item.checked ? '<span class="item-check-icon">✅</span>' : ''}
                </div>
              `).join('')}
            </div>
          `}
        `;
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <div class="empty-icon">🔍</div>
            <h3>Lista no encontrada</h3>
            <p>La lista ya no está disponible o el enlace es incorrecto</p>
          </div>
        `;
      }
    }

    async function toggleItem(itemId, idx) {
      const checkbox = document.querySelectorAll('.item input[type="checkbox"]')[idx];
      const checked = checkbox.checked;
      const itemDiv = checkbox.closest('.item');
      const nameEl = itemDiv.querySelector('.item-name');

      if (nameEl) {
        nameEl.classList.toggle('checked', checked);
      }

      if (checked) {
        itemDiv.insertAdjacentHTML('beforeend', '<span class="item-check-icon">✅</span>');
      } else {
        const checkIcon = itemDiv.querySelector('.item-check-icon');
        if (checkIcon) checkIcon.remove();
      }

      try {
        await fetch(`${API_BASE}/shared/${token}/items/${itemId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ checked }),
        });
        loadSharedList();
      } catch (err) {
        console.error('Toggle error:', err);
      }
    }
  </script>
</body>
</html>
