services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymbros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymbros}
      POSTGRES_DB: ${POSTGRES_DB:-gymbros}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gymbros} -d ${POSTGRES_DB:-gymbros}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gymbros:gymbros@db:5432/gymbros}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

volumes:
  postgres_data:
